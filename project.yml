name: ReplyAI
options:
  bundleIdPrefix: co.replyai
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: co.replyai.mac
    PRODUCT_NAME: ReplyAI
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    COMBINE_HIDPI_IMAGES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  ReplyAI:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - "ReplyAI/Resources/Info.plist"
          - "ReplyAI/Resources/ReplyAI.entitlements"
          - "ReplyAI/Resources/Fonts/README.md"
    info:
      path: Sources/ReplyAI/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDisplayName: ReplyAI
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 ReplyAI"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSRequiresAquaSystemAppearance: false
        # Auto-registers every font file in Resources/Fonts/ at launch.
        ATSApplicationFontsPath: Fonts
        ApplicationFontsPath: Fonts
    entitlements:
      path: Sources/ReplyAI/Resources/ReplyAI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
